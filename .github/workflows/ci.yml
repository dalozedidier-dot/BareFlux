name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and dev deps
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]" -c .github/constraints.txt

      - name: Compile Python files
        run: |
          python -m compileall src/bareflux tests tools examples

      - name: Check formatting
        run: |
          black --check src/bareflux tests tools examples

      - name: Run tests
        run: |
          pytest -q
