name: collect-stable

on:
  workflow_dispatch:
    inputs:
      thresholds:
        description: "Correlation thresholds, comma-separated"
        required: false
        default: "0.50,0.60,0.70,0.75,0.80"
      k:
        description: "Repetitions per threshold"
        required: false
        default: "5"
      n:
        description: "Rows per synthetic dataset"
        required: false
        default: "200"
      seed:
        description: "Random seed"
        required: false
        default: "42"

concurrency:
  group: bloc4-collect-stable-${{ github.ref }}
  cancel-in-progress: true

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout BareFlux
        uses: actions/checkout@v4

      - name: Checkout RiftLens
        uses: actions/checkout@v4
        with:
          repository: dalozedidier-dot/RiftLens
          path: modules/RiftLens

      - name: Checkout NullTrace
        uses: actions/checkout@v4
        with:
          repository: dalozedidier-dot/NullTrace
          path: modules/NullTrace

      - name: Checkout VoidMark
        uses: actions/checkout@v4
        with:
          repository: dalozedidier-dot/VoidMark
          path: modules/VoidMark

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install -U pip
          python -m pip install -e ".[dev]" -c .github/constraints.txt
          for dir in modules/RiftLens modules/NullTrace modules/VoidMark; do
            if [ -f "$dir/requirements.txt" ] && [ -s "$dir/requirements.txt" ]; then
              python -m pip install -r "$dir/requirements.txt" -c .github/constraints.txt
            fi
          done

      - name: Generate synthetic datasets
        run: |
          set -euo pipefail
          mkdir -p _ci_out/datasets
          python tools/generate_synth_datasets.py --out-dir _ci_out/datasets --n "${{ github.event.inputs.n }}" --seed "${{ github.event.inputs.seed }}"

      - name: Generate robustness stress datasets
        run: |
          set -euo pipefail
          python tools/robustness_stress_tests.py --out-dir _ci_out/robustness --n "${{ github.event.inputs.n }}" --seed "${{ github.event.inputs.seed }}"

      - name: Collect stability
        run: |
          set -euo pipefail
          python tools/collect_stable.py \
            --thresholds "${{ github.event.inputs.thresholds }}" \
            --k "${{ github.event.inputs.k }}" \
            --datasets-dir "${{ github.workspace }}/_ci_out/datasets" \
            --out-dir "${{ github.workspace }}/_ci_out/stability"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bloc4-stability
          path: |
            _ci_out/datasets/**
            _ci_out/robustness/**
            _ci_out/stability/**
          if-no-files-found: ignore
