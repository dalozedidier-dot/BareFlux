name: orchestrate

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "run_modules.sh"
      - "src/**"
      - "tools/**"
      - ".github/workflows/orchestrate.yml"

concurrency:
  group: bareflux-orchestrate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-all:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout BareFlux
        uses: actions/checkout@v4

      - name: Checkout RiftLens
        uses: actions/checkout@v4
        with:
          repository: dalozedidier-dot/RiftLens
          path: modules/RiftLens

      - name: Checkout NullTrace
        uses: actions/checkout@v4
        with:
          repository: dalozedidier-dot/NullTrace
          path: modules/NullTrace

      - name: Checkout VoidMark
        uses: actions/checkout@v4
        with:
          repository: dalozedidier-dot/VoidMark
          path: modules/VoidMark

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install -U pip
          python -m pip install -e ".[dev]" -c .github/constraints.txt
          for dir in modules/RiftLens modules/NullTrace modules/VoidMark; do
            if [ -f "$dir/requirements.txt" ] && [ -s "$dir/requirements.txt" ]; then
              python -m pip install -r "$dir/requirements.txt" -c .github/constraints.txt
            fi
            if [ -f "$dir/requirements-dev.txt" ] && [ -s "$dir/requirements-dev.txt" ]; then
              python -m pip install -r "$dir/requirements-dev.txt" -c .github/constraints.txt
            fi
          done

      - name: Run BareFlux strict orchestration
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          bash run_modules.sh --modules-dir modules --out _bareflux_out --strict

      - name: Upload outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bareflux-orchestration-out
          path: |
            _bareflux_out/**
            _ci_out/datasets/**
          if-no-files-found: ignore
